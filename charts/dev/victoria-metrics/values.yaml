victoria-metrics-cluster:
  vmselect:
    replicaCount: 5

    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        kubernetes.io/ingress.class: "nginx"
        cert-manager.io/cluster-issuer: "self-signed"
      hosts:
        - name: select.vm.example.com
          path: /
          port: http
      tls:
        - secretName: vm-ingress-tls
          hosts:
            - select.vm.example.com


  vminsert:
    replicaCount: 5

    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        kubernetes.io/ingress.class: "nginx"
        cert-manager.io/cluster-issuer: "self-signed"
      hosts:
        - name: insert.vm.example.com
          path: /
          port: http
      tls:
        - secretName: vm-ingress-tls
          hosts:
            - insert.vm.example.com              

  vmstorage:
    retentionPeriod: 1 # month
    replicaCount: 5
    fullnameOveride: "vmstorage"

    persistentVolume:
      enabled: true
      existingClaim: ""

      size: 10Gi
      storageClass: "csi-manila-cephfs"
    
    extraContainers:
      - name: vmbackup
        image: victoriametrics/vmbackup:v1.96.0 # Use the desired version
        command:
          - "/bin/bash"
          - "-c"
          - |
            echo "vmbackup sidecar running. Use this container for backups."; \
            while true; do sleep 3600; done
        volumeMounts:
          - name: storage-volume
            mountPath: /storage

    podSpec:
      volumes:
        - name: storage-volume
          persistentVolumeClaim:
            claimName: vmstorage-pvc # Reference to the PVC created by csi-manila-cephfs            


stfc-cloud-logging:
  opensearchCredentials:
    username: writer-staging
  fluent-operator:
    fluentd:
      crdsEnable: false
    fluentbit:
      output:
        loki:
          enable: false
        opensearch:
          logstashPrefix: kube_logs_staging_worker
          # staging worker opensearch for now, with plans to move it to prod/olaf
          host: opensearch.staging-worker.stfc.ac.uk
          port: 443
        prometheusMetricsExporter:
          match: "fb.metrics"
      input:
        fluentBitMetrics:
          scrapeInterval: "2"
          scrapeOnStart: true
          tag: "fb.metrics"
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-deployed-apps
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/stfc/cloud-deployed-apps.git
    targetRevision: main
    path: clusters/prod/management
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true

---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: management-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=invalid"]
  generators:
    - list:
        elements:
          # NOTE: each chart needs a valuesFile for this to work
          # so create one for each chart - even if its empty

          # argocd and all dependencies use the same file "argocd-setup-values.yaml"
          - name: argocd
            chartName: argocd
            namespace: argocd
            valuesFile: ../../../clusters/prod/management/argocd-setup-values.yaml
            secretsFile: ../../../clusters/prod/management/secrets/apps/argocd.yaml

          - name: logging
            chartName: logging
            namespace: logging-system
            valuesFile: ../../../clusters/prod/management/logging.yaml
            secretsFile: ../../../clusters/prod/management/secrets/apps/logging.yaml

          - name: cert-manager
            chartName: cert-manager
            namespace: cert-manager
            valuesFile: ../../../clusters/prod/management/argocd-setup-values.yaml

          - name: cluster-api-addon-provider
            chartName: cluster-api-addon-provider
            namespace: capi-addon-system
            valuesFile: ../../../clusters/prod/management/argocd-setup-values.yaml

          - name: envoy-gateways
            chartName: envoy-gateways
            namespace: envoy-gateway-system
            valuesFile: ../../../clusters/prod/management/envoy-gateways-values.yaml

          - name: monitoring-stack
            chartName: monitoring-stack
            namespace: monitoring-system
            valuesFile: ../../../clusters/prod/management/monitoring-stack-values.yaml
            secretsFile: ../../../clusters/prod/management/secrets/apps/monitoring-stack.yaml

  syncPolicy:
    # Don't remove everything if we remove the appset
    preserveResourcesOnDeletion: true

  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/compare-options: ServerSideDiff=true, IncludeMutationWebhook=true
    spec:
      project: default
      source:
        repoURL: "https://github.com/stfc/cloud-deployed-apps.git"
        targetRevision: main
        path: "charts/prod/{{.chartName}}"
        helm:
          valueFiles:
            - '{{.valuesFile | default "../../../clusters/_shared/dummy.yaml"}}'
            - secrets://{{ .secretsFile | default "../../../clusters/_shared/dummy.yaml"}}

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true

      ignoreDifferences:
        # ignore outofsync issues with httproute refs when not specifying all the values
        # k8s adds them for us, argocd considers this a sync issue but we should ignore this
        - kind: HTTPRoute
          jsonPointers:
            - /spec/rules/backendRefs
            - /spec/parentRefs

---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: management-clusters
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: "https://github.com/stfc/cloud-deployed-apps.git"
        revision: main
        files:
          # grab all infra values for all clusters in environment
          - path: "clusters/prod/*/infra-values.yaml"
  syncPolicy:
    preserveResourcesOnDeletion: true

  template:
    metadata:
      name: "prod-{{path.basename}}-cluster"
      # All applications need to go into the ArgoCD namespace
      namespace: argocd
      annotations:
        argocd.argoproj.io/compare-options: ServerSideDiff=true, IncludeMutationWebhook=true
    spec:
      project: default
      destination:
        namespace: "prod-{{path.basename}}-cluster"
        server: https://kubernetes.default.svc
      source:
        repoURL: https://github.com/stfc/cloud-deployed-apps.git
        targetRevision: main
        path: charts/prod/capi-infra
        helm:
          valueFiles:
            # Bring in infra values specific to this cluster
            - "../../../{{path}}/{{path.filename}}"
            # Bring in infra secrets specific to this cluster
            - "secrets://../../../clusters/{{path[1]}}/{{path[2]}}/secrets/infra/api-server-fip.yaml"
            - "secrets://../../../clusters/{{path[1]}}/{{path[2]}}/secrets/infra/app-creds.yaml"

      syncPolicy:
        automated:
          # Remove anything that isn't in the helm chart output
          prune: true
          selfHeal: true
          allowEmpty: true
        syncOptions:
          - CreateNamespace=true

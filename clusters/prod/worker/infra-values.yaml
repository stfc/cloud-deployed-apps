stfc-cloud-openstack-cluster:
  openstack-cluster:
    cloudCredentialsSecretName: prod-worker-cluster-cloud-credentials

    nodeGroups:
      - name: default-md-0
        machineCount: 5
    addons:
      etcdDefrag:
        release:
          values:
            schedule: 11 12 * * * # smearing the time for defrag job 11:12am daily

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-deployed-apps
  namespace: argocd
spec:
  destination:
    namespace: argocd
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/stfc/cloud-deployed-apps.git
    targetRevision: main
    path: clusters/prod/worker
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true

---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prod-worker-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=invalid"]
  generators:
    - list:
        elements:
          # NOTE: each chart needs a valuesFile for this to work
          # so create one for each chart - even if its empty

          # argocd and all dependencies use the same file "argocd-setup-values.yaml"
          - name: argocd
            chartName: argocd
            namespace: argocd
            valuesFile: ../../../clusters/prod/worker/argocd-setup-values.yaml
            secretsFile: ../../../clusters/prod/worker/secrets/apps/argocd.yaml

          - name: logging
            chartName: logging
            namespace: logging-system
            valuesFile: ../../../clusters/prod/worker/logging.yaml
            secretsFile: ../../../clusters/prod/worker/secrets/apps/logging.yaml

          - name: cert-manager
            chartName: cert-manager
            namespace: cert-manager
            valuesFile: ../../../clusters/prod/worker/argocd-setup-values.yaml

          - name: cluster-api-addon-provider
            chartName: cluster-api-addon-provider
            namespace: capi-addon-system
            valuesFile: ../../../clusters/prod/worker/argocd-setup-values.yaml

          #  running on staging for testing but not on prod
          #          - name: manila-csi
          #            chartName: manila-csi
          #            namespace: manila-csi
          #            valuesFile: ../../../clusters/prod/worker/argocd-setup-values.yaml
          #            secretsFile: ../../../clusters/prod/worker/secrets/apps/manila-csi.yaml

          # running on staging but not on prod
          #          - name: longhorn
          #            chartName: longhorn
          #            namespace: longhorn-system
          #            valuesFile: ../../../clusters/prod/worker/argocd-setup-values.yaml

          - name: harbor
            chartName: harbor
            namespace: harbor
            secretsFile: ../../../clusters/prod/worker/secrets/apps/harbor.yaml
            valuesFile: ../../../clusters/prod/worker/harbor-values.yaml

          - name: rabbit-consumer
            chartName: rabbit-consumer
            namespace: rabbit-consumer
            valuesFile: ../../../clusters/prod/worker/rabbit-consumer-values.yaml

          # running on staging but not on prod
          #          - name: opensearch
          #            chartName: opensearch
          #            namespace: opensearch
          #            valuesFile: ../../../clusters/prod/worker/opensearch-values.yaml
          #            secretsFile: ../../../clusters/prod/worker/secrets/apps/opensearch.yaml

          - name: docker-registry
            chartName: docker-registry
            namespace: docker-registry
            valuesFile: ../../../clusters/prod/worker/docker-registry-values.yaml
            secretsFile: ../../../clusters/prod/worker/secrets/apps/docker-registry.yaml

          - name: envoy-gateways
            chartName: envoy-gateways
            namespace: envoy-gateway-system
            valuesFile: ../../../clusters/prod/worker/envoy-gateways-values.yaml

          - name: monitoring-stack
            chartName: monitoring-stack
            namespace: monitoring-system
            valuesFile: ../../../clusters/prod/worker/monitoring-stack-values.yaml
            secretsFile: ../../../clusters/prod/worker/secrets/apps/monitoring-stack.yaml

  syncPolicy:
    # Don't remove everything if we remove the appset
    preserveResourcesOnDeletion: true

  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      annotations:
        argocd.argoproj.io/compare-options: ServerSideDiff=true, IncludeMutationWebhook=true
    spec:
      project: default
      source:
        repoURL: "https://github.com/stfc/cloud-deployed-apps.git"
        targetRevision: main
        path: "charts/prod/{{.chartName}}"
        helm:
          valueFiles:
            - '{{.valuesFile | default "../../../clusters/_shared/dummy.yaml"}}'
            - secrets://{{ .secretsFile | default "../../../clusters/_shared/dummy.yaml"}}

      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true

      # ignore outofsync issues with longhorn CRDs with "preserveUnknownField"
      # https://github.com/argoproj/argo-cd/issues/6401#issuecomment-854995249
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /spec/preserveUnknownFields

        # ignore outofsync issues with httproute refs when not specifying all the values
        # k8s adds them for us, argocd considers this a sync issue but we should ignore this
        - kind: HTTPRoute
          jsonPointers:
            - /spec/rules/backendRefs
            - /spec/parentRefs

  templatePatch: |
    {{- if eq .name "manila-csi" }}
      spec:
        ignoreDifferences:
          - group: rbac.authorization.k8s.io
            kind: ClusterRole
            name: manila-csi-openstack-manila-csi-controllerplugin
            jsonPointers:
              - /rules
          - group: rbac.authorization.k8s.io
            kind: ClusterRole
            name: manila-csi-openstack-manila-csi-nodeplugin
            jsonPointers:
              - /rules
    {{- end }}


materials-galaxy:
  galaxy-deps:
    postgresql:
      #- Whether to deploy the postgresl operator.
      #- In general, we recommend installing the operator globally in production.
      deploy: true

    #- Configuration block if `cvmfs` is used as `refdata.type`
    cvmfs:
      deploy: false
    
    s3csi:
      deploy: false

    rabbitmq:
      deploy: true
  
  oauth2-proxy:
    extraArgs:
      redirect-url: "https://galaxy.dev-worker.nubes.stfc.ac.uk/oauth2/callback"

  galaxy:
    ingress:
      hosts:
      - host: "galaxy.dev-worker.nubes.stfc.ac.uk"
        paths:
          - path: "/"
      tls:
      - hosts:
          - "galaxy.dev-worker.nubes.stfc.ac.uk" 
        secretName: galaxy-tls
  
    # standalone db to reduce galaxy memory footprint
    postgresql:
      enabled: true
      deploy: false
      persistence: 
        enabled: true
        storageClassName: longhorn
        storage: 10Gi
    
    cvmfs:
      deploy: false

    # turn off file transfering for now
    tusd:
      enabled: false
    
    rabbitmq:
      persistence:
        storageClassName: longhorn
        storage: 10Gi